name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/validate_repository.py
      - run: python3 scripts/validate_excerpts.py
      - run: python3 scripts/validate_details.py
      - run: python3 scripts/build_detail_bridge_index.py --check
      - run: python3 scripts/build_learning_field_focus_maps.py --check
      - run: python3 scripts/validate_detail_source_alignment.py
      - run: python3 scripts/validate_detail_backlog.py
      - run: python3 scripts/validate_view_export.py
      - run: python3 scripts/validate_source_health.py
